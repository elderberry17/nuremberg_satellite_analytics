project_name: UTN ML Final Project - Advanced Stack
random_seed: 42

paths:
  boundary_file: ../data/raw/nuremberg_boundary.geojson
  grid_file: ../data/interim/nuremberg_grid_250m.geojson
  labels_table: ../data/processed/worldcover_labels.parquet
  features_table: ../data/processed/sentinel_features.parquet
  modeling_table: ../data/processed/modeling_table.parquet
  worldcover_2020: ../data/raw/worldcover/ESA_WorldCover_2020.tif
  worldcover_2021: ../data/raw/worldcover/ESA_WorldCover_2021.tif
  sentinel_rgbnir_2020: ../data/raw/sentinel/rgbnir_2020.tif
  sentinel_rgbnir_2021: ../data/raw/sentinel/rgbnir_2021.tif
  sentinel_swir_2020: ../data/raw/sentinel/swir_2020.tif
  sentinel_swir_2021: ../data/raw/sentinel/swir_2021.tif
  app_predictions: ../artifacts/predictions/app_predictions.geojson
  uncertainty_table: ../artifacts/evaluation/random_forest_uncertainty.parquet
  dual_evaluation_summary: ../artifacts/evaluation/dual_evaluation_summary.csv
  dual_model_registry: ../artifacts/models/dual_model_registry.json
  sentinel_scene_2020: ../data/raw/sentinel/2020.SAFE
  sentinel_scene_2021: ../data/raw/sentinel/2021.SAFE

crs:
  metric: EPSG:32632
  web: EPSG:4326

grid:
  cell_size_m: 250
  keep_full_cells: true

worldcover:
  nodata_values: [0]
  all_touched: false

sentinel:
  nodata_values: [0]
  rgbnir_band_names: [B02, B03, B04, B08]
  swir_expected_band_count: 2
  rgbnir_expected_band_count: 4
  all_touched: false
  stats: [median, p25, p75, std]
  use_swir_if_valid: true

classes:
  built_up:
    worldcover_codes: [50]
  vegetation:
    worldcover_codes: [10, 20, 30, 40, 90, 95, 100]
  water:
    worldcover_codes: [80]
  other:
    worldcover_codes: [60, 70]

modeling:
  targets: [delta_built_up, delta_vegetation, delta_water, delta_other]
  direct_delta_targets: [delta_built_up, delta_vegetation, delta_water, delta_other]
  forecast_anchor_year: 2020
  forecast_target_year: 2021
  app_inference_anchor_year: 2021
  app_forecast_year: 2022
  app_observed_years: [2020, 2021]
  app_target_years: [2021, 2022]
  app_final_model_name: random_forest
  app_final_model_name_tplus1: random_forest
  app_final_model_name_delta: gradient_boosting # elastic_net
  change_threshold: 0.10
  spatial_block_size_m: 1500
  test_fraction: 0.20
  drop_geometry_from_modeling: true

training:
  hpo:
    enabled: true
    n_trials: 5 # For Prod: 20
    validation_fraction: 0.20
    optimize_metric: mae
  elastic_net:
    alpha: 0.01
    l1_ratio: 0.5
    max_iter: 20000
  random_forest:
    n_estimators: 400
    max_depth: 18
    min_samples_leaf: 2
    n_jobs: -1
  gradient_boosting:
    learning_rate: 0.05
    max_iter: 300
    max_depth: 6
    min_samples_leaf: 20
    l2_regularization: 0.0

reporting:
  hotspot_export_rows: 25
  intended_users:
    - city planning students
    - sustainability analysts
    - exploratory screening teams
  not_for_decisions:
    - parcel-level enforcement
    - legal boundary disputes
    - cadastral adjudication
